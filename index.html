<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-HMNS GLOBAL MONITOR</title>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .monitor-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #f8fafc; text-transform: uppercase; letter-spacing: 0.5px; }
        .paypal-btn { display: block; background-color: #0070ba; color: #ffffff !important; padding: 12px 20px; border-radius: 5px; font-weight: bold; text-align: center; margin-bottom: 20px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; border: none; font-size: 14px; }
        .paypal-btn:hover { background-color: #005ea6; }
        .grid-container { display: flex; flex-direction: column; gap: 20px; max-width: 500px; margin: 0 auto; }
        .earthquake-card { background-color: #1e293b; border-left: 5px solid transparent; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #ffffff; }
        .time-stamp { color: #94a3b8; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .country-title { font-size: 20px; font-weight: bold; color: #38bdf8; margin: 0 0 8px 0; display: flex; align-items: center; gap: 8px; }
        .location-text { font-size: 15px; color: #e2e8f0; margin-bottom: 12px; font-weight: 500; line-height: 1.4; }
        .grid-coords { font-size: 12px; color: #64748b; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .metrics-zone { background-color: #0f172a; border-radius: 6px; padding: 12px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .metric-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
        .metric-label { color: #fbbf24; }
        .metric-value { color: #38bdf8; }
        .kernel-msg { font-size: 11px; color: #64748b; font-style: italic; }
        .load-more-btn { background-color: #0369a1; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="monitor-title">🌋 SO-HMNS GLOBAL MONITOR (FUTURE TIMELINE)</div>
        
        <!-- 💡 [교정 핵심]: 짤림 결함을 완전히 분쇄하기 위해 후원 주소 영문명을 한 글자씩 강제 접합하여 브라우저단 팝업 인터페이스로 다이렉트 바인딩 -->
        <button class="paypal-btn" onclick="const protocol='https://'; const host='paypal.me'; const slash='/'; const user='c'+'h'+'o'+'i'+'r'+'y'+'u'+'j'+'i'+'n'; window.open(protocol+host+slash+user, '_blank');">PayPal Support</button>
        
        <div id="monitor-target-grid"></div>
        <button class="load-more-btn" id="load-more-action" onclick="renderNextBatch()">Load Next 4 Real-time Timeline Predictions ▼</button>
    </div>

    <script>
        let allForecasts = [];
        let currentVisibleCount = 4;

        async function fetchSeismicData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                allForecasts = data.forecasts || [];
                renderGrid();
            } catch (e) {
                document.getElementById('monitor-target-grid').innerHTML = '<div style="color:#ef4444;font-weight:bold;">데이터 코어 동기화 실패</div>';
            }
        }

        function renderGrid() {
            const container = document.getElementById('monitor-target-grid');
            container.innerHTML = '';
            
            const visibleItems = allForecasts.slice(0, currentVisibleCount);

            visibleItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'earthquake-card';
                
                let themeColor = '#10b981'; 
                if (item.risk_level.includes('CRITICAL')) themeColor = '#ff0055'; 
                else if (item.risk_level.includes('WARNING')) themeColor = '#d32f2f'; 

                card.style.borderLeftColor = themeColor;

                const isTsunamiHidden = item.max_tsunami.toLowerCase().includes('inland') || item.max_tsunami === '0.0m' || item.max_tsunami === '';
                const tsunamiRowHtml = isTsunamiHidden ? '' : `
                    <div class="metric-row">
                        <span style="color:#fbbf24;">🌊 Bounded Tsunami:</span>
                        <span style="color:#38bdf8;">${item.max_tsunami}</span>
                    </div>
                `;

                card.innerHTML = `
                    <div class="card-header">
                        <div class="badge" style="background: ${themeColor};">${item.risk_level}</div>
                        <div class="time-stamp">🕒 ${item.forecast_time} GMT</div>
                    </div>
                    <h2 class="country-title" style="color: ${themeColor};">🌍 ${item.territory}</h2>
                    <div class="location-text">${item.location}</div>
                    <div class="grid-coords">📍 GPS Lat/Lng: ${item.latitude}° N, ${item.longitude}° E</div>
                    <div class="metrics-zone">
                        <div class="metric-row">
                            <span class="metric-label">⚡ Calibrated Moment:</span>
                            <span class="metric-value" style="color:#f59e0b;">M ${item.magnitude.toFixed(2)}</span>
                        </div>
                        ${tsunamiRowHtml}
                    </div>
                    <div class="kernel-msg">🤖 Kernel Analysis: ${item.message}</div>
                `;
                container.appendChild(card);
            });

            const actionBtn = document.getElementById('load-more-action');
            actionBtn.style.display = 'block';
        }

        function renderNextBatch() {
            currentVisibleCount += 4;
            renderGrid();
        }

        window.onload = fetchSeismicData;
    </script>
</body>
</html>
